name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Type of version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Git Config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read current version
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "CURRENT_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Compute new version
        shell: bash
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ env.CURRENT_VERSION }}"
          if [ "${{ github.event.inputs.bump_type }}" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "${{ github.event.inputs.bump_type }}" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Update Cargo.toml
        shell: bash
        run: |
          sed -i "s/^version = \"${{ env.CURRENT_VERSION }}\"/version = \"${{ env.NEW_VERSION }}\"/" Cargo.toml

      - name: Commit and push branch
        shell: bash
        run: |
          git checkout -b "chore/version-bump-v${{ env.NEW_VERSION }}"
          git add Cargo.toml
          git commit -m "chore: bump version to v${{ env.NEW_VERSION }}"
          git push origin "chore/version-bump-v${{ env.NEW_VERSION }}"

      - name: Create Pull Request via gh CLI
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: bump version to v${{ env.NEW_VERSION }}" \
            --body "Bumping version from \`${{ env.CURRENT_VERSION }}\` → \`${{ env.NEW_VERSION }}\`
          - Bump type: \`${{ github.event.inputs.bump_type }}\`
          - Updated: \`Cargo.toml\`" \
            --base main \
            --head "chore/version-bump-v${{ env.NEW_VERSION }}" \
            --label "version-bump" || true
