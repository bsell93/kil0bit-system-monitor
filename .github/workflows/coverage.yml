name: Coverage

on:
  push:
    branches: [ main ]
    paths-ignore:
      - badges/coverage-badge.json
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore test project
        run: dotnet restore Kil0bitSystemMonitor.Tests/Kil0bitSystemMonitor.Tests.csproj

      - name: Install coverage tools
        run: |
          dotnet tool install --global dotnet-coverage
          dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Collect coverage
        run: |
          dotnet-coverage collect "dotnet test Kil0bitSystemMonitor.Tests/Kil0bitSystemMonitor.Tests.csproj --configuration Release --no-restore" -f cobertura -o coverage.cobertura.xml

      - name: Generate coverage summary
        run: |
          reportgenerator "-reports:coverage.cobertura.xml" "-targetdir:coveragereport" "-reporttypes:MarkdownSummaryGithub;TextSummary" "-assemblyfilters:+Kil0bitSystemMonitor;-Kil0bitSystemMonitor.Tests"
          cat coveragereport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Generate coverage badge payload
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          line_rate=$(python3 - <<'PY'
          import pathlib
          import re

          summary_text = pathlib.Path("coveragereport/Summary.txt").read_text(encoding="utf-8")
          match = re.search(r"Line coverage:\s*([0-9]+(?:\.[0-9]+)?)%", summary_text)
          if not match:
              raise SystemExit("Unable to parse line coverage from coveragereport/Summary.txt")
          print(f"{float(match.group(1)):.2f}")
          PY
          )

          python3 - "$line_rate" <<'PY'
          import json
          import pathlib
          import sys

          pct = float(sys.argv[1])
          if pct >= 90:
              color = "brightgreen"
          elif pct >= 80:
              color = "green"
          elif pct >= 70:
              color = "yellowgreen"
          elif pct >= 60:
              color = "yellow"
          elif pct >= 50:
              color = "orange"
          else:
              color = "red"

          payload = {
              "schemaVersion": 1,
              "label": "coverage",
              "message": f"{pct:.2f}%",
              "color": color,
          }

          badge_path = pathlib.Path("badges/coverage-badge.json")
          badge_path.parent.mkdir(parents=True, exist_ok=True)
          badge_path.write_text(json.dumps(payload), encoding="utf-8")
          PY

      - name: Commit coverage badge payload
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(ci): update coverage badge payload"
          file_pattern: badges/coverage-badge.json

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.cobertura.xml
            coveragereport/
